<div class="map-container">
    <h2>IL NOSTRO CAMPO DA GIOCO</h2>
    <p>Ci alleniamo presso la <b>SSD Airone</b> in Via del Quadraro, Roma.</p>
    <p>Si trova a 2 minutes dalla fermata <b>MA Lucio Sestio.</b></p>
    
    <div id="map"></div>
</div>

    <div class="footer-social">
        <a href="https://www.instagram.com/germania_torneicontiyoung?utm_source=qr" target="_blank" class="instagram"><i class="fab fa-instagram"></i> Instagram</a>

<script>
    var lat = 41.8647;
    var lng = 12.5332;

    var map = L.map('map').setView([lat, lng], 17);
    
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors'
    }).addTo(map);

    L.marker([lat, lng]).addTo(map)
        .bindPopup('<b>SSD Airone</b><br>Via del Quadraro, Roma<br>Campo in cui si svolgerà il Torneo Conti Young')
        .openPopup();

    setTimeout(function() {
        map.invalidateSize();
    }, 300);
</script>
